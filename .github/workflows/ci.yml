name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npm run lint
      - run: npx vsce package --out qwen-copilot.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: qwen-copilot.vsix
          retention-days: 7
